name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-skill:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
  
      - name: Publish skill to SkillHub
        run: |
          npx @skill-hub/cli push
          npx @skill-hub/cli publish
        env:
          SKILLHUB_TOKEN: ${{ secrets.SKILLHUB_TOKEN }}
